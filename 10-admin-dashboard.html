<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Noto Sans Arabic', sans-serif; background: #f7fafc; }
    h1, h2 { font-family: 'Cairo', sans-serif; }
  </style>
</head>
<body>

<nav style="background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 20px;">
  <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between;">
    <h1 style="font-size: 24px; color: #002045;">بوابة مسؤول النظام</h1>
    <a href="02-login.html" style="color: #b23b34; text-decoration: none;">خروج</a>
  </div>
</nav>

<div style="display: grid; grid-template-columns: 250px 1fr;">
  <!-- Sidebar -->
  <aside style="background: linear-gradient(to bottom, #002045, #1a365d); color: white; padding: 20px; height: 100vh;">
    <div style="display: flex; flex-direction: column; gap: 12px;">
      <a href="#" style="color: white; text-decoration: none; padding: 12px; border-radius: 6px; background: rgba(255,255,255,0.1);">📊 لوحة المعلومات</a>
      <a href="#" style="color: white; text-decoration: none; padding: 12px; border-radius: 6px; hover:background: rgba(255,255,255,0.1);">📋 إدارة الطلبات</a>
      <a href="#" style="color: white; text-decoration: none; padding: 12px; border-radius: 6px;">📜 إدارة العقود</a>
      <a href="#" style="color: white; text-decoration: none; padding: 12px; border-radius: 6px;">🏢 إدارة الجمعيات</a>
      <a href="#" style="color: white; text-decoration: none; padding: 12px; border-radius: 6px;">👥 إدارة المستخدمين</a>
      <a href="#" style="color: white; text-decoration: none; padding: 12px; border-radius: 6px;">📊 التقارير</a>
      <a href="#" style="color: white; text-decoration: none; padding: 12px; border-radius: 6px;">⚙️ الإعدادات</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main style="padding: 40px;">
    <h2 style="font-size: 32px; color: #002045; margin-bottom: 30px;">لوحة تحكم مسؤول النظام</h2>

    <!-- Stats -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px;">
      <div style="background: white; padding: 24px; border-radius: 12px; border-left: 4px solid #002045;">
        <div style="font-size: 32px; font-weight: 900; color: #002045;">520</div>
        <div style="color: #43474e; font-size: 14px;">الجمعيات المسجلة</div>
      </div>
      <div style="background: white; padding: 24px; border-radius: 12px; border-left: 4px solid #fbbf24;">
        <div style="font-size: 32px; font-weight: 900; color: #fbbf24;">345</div>
        <div style="color: #43474e; font-size: 14px;">الطلبات قيد المراجعة</div>
      </div>
      <div style="background: white; padding: 24px; border-radius: 12px; border-left: 4px solid #2c694e;">
        <div style="font-size: 32px; font-weight: 900; color: #2c694e;">268</div>
        <div style="color: #43474e; font-size: 14px;">الطلبات المقبولة</div>
      </div>
      <div style="background: white; padding: 24px; border-radius: 12px; border-left: 4px solid #b23b34;">
        <div style="font-size: 32px; font-weight: 900; color: #b23b34;">45</div>
        <div style="color: #43474e; font-size: 14px;">الطلبات المرفوضة</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div style="background: white; padding: 24px; border-radius: 12px;">
      <h3 style="font-size: 20px; color: #002045; margin-bottom: 20px;">الإجراءات السريعة</h3>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px;">
        <button style="background: #002045; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer;">مراجعة الطلبات</button>
        <button style="background: #2c694e; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer;">إدارة العقود</button>
        <button style="background: #1a365d; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer;">إدارة الجمعيات</button>
        <button style="background: #43474e; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer;">استخراج تقرير</button>
      </div>
    </div>
  </main>
</div>

</body>
</html>
