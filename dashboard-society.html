<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الجمعية - منصة داما</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans Arabic', sans-serif; background: #f7fafc; }

    .navbar {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar h1 { color: #1e3a5f; font-size: 24px; }
    .navbar a { color: #666; text-decoration: none; cursor: pointer; }
    .navbar a:hover { color: #1e3a5f; }

    .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

    .welcome-section {
      background: linear-gradient(135deg, #1e3a5f 0%, #2c694e 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      border-left: 4px solid #2c694e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .stat-card .number {
      font-size: 28px;
      font-weight: bold;
      color: #1e3a5f;
      margin-bottom: 8px;
    }

    .stat-card .label { color: #666; font-size: 14px; }

    .section {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .section h3 {
      color: #1e3a5f;
      margin-bottom: 20px;
      font-size: 18px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 12px;
    }

    .button-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
    }

    .btn-primary { background: #1e3a5f; color: white; }
    .btn-primary:hover { background: #0d1b2a; }
    .btn-secondary { background: #2c694e; color: white; }
    .btn-secondary:hover { background: #1f5236; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid #e2e8f0;
    }

    th {
      background: #f7fafc;
      font-weight: 600;
      color: #1e3a5f;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-approved { background: #dcfce7; color: #166534; }
    .status-rejected { background: #fdf3f2; color: #b23b34; }
    .status-pending { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>

<div class="navbar">
  <h1>🏛️ لوحة الجمعية</h1>
  <div>
    <span id="userName">المستخدم</span>
    <a href="login.html" onclick="logout(event)"> | خروج</a>
  </div>
</div>

<div class="container">

  <div class="welcome-section">
    <h2 id="welcomeMsg">مرحباً بك</h2>
    <p id="societyName">جمعية...</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="number" id="appCount">0</div>
      <div class="label">إجمالي الطلبات</div>
    </div>
    <div class="stat-card">
      <div class="number" id="approvedCount">0</div>
      <div class="label">مقبولة</div>
    </div>
    <div class="stat-card">
      <div class="number" id="pendingCount">0</div>
      <div class="label">قيد المراجعة</div>
    </div>
    <div class="stat-card">
      <div class="number" id="totalGrants">0</div>
      <div class="label">إجمالي المنح</div>
    </div>
  </div>

  <div class="section">
    <h3>الإجراءات السريعة</h3>
    <div class="button-group">
      <button class="btn btn-primary" onclick="newApplication()">طلب جديد</button>
      <button class="btn btn-secondary" onclick="viewApplications()">الطلبات</button>
      <button class="btn btn-secondary" onclick="viewContracts()">العقود</button>
      <button class="btn btn-secondary" onclick="viewProfile()">الملف</button>
    </div>
  </div>

  <div class="section">
    <h3>آخر الطلبات</h3>
    <table>
      <thead>
        <tr>
          <th>الرقم</th>
          <th>البرنامج</th>
          <th>المبلغ</th>
          <th>الحالة</th>
          <th>التاريخ</th>
        </tr>
      </thead>
      <tbody id="appTable">
        <tr><td colspan="5" style="text-align: center; color: #999;">لا توجد طلبات</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="js/dama-system.js"></script>
<script>
function loadData() {
  const user = JSON.parse(localStorage.getItem('damaCurrentUser'));
  const database = JSON.parse(localStorage.getItem('damaDatabase'));

  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('userName').textContent = user.name;
  document.getElementById('welcomeMsg').textContent = 'مرحباً: ' + user.name;

  const apps = database.applications || [];
  const approved = apps.filter(a => a.decision === 'approved').length;
  const pending = apps.filter(a => a.status === 'pending_review').length;
  const total = apps.filter(a => a.decision === 'approved').reduce((s, a) => s + a.requestedAmount, 0);

  document.getElementById('appCount').textContent = apps.length;
  document.getElementById('approvedCount').textContent = approved;
  document.getElementById('pendingCount').textContent = pending;
  document.getElementById('totalGrants').textContent = (total / 1000).toFixed(0) + 'K';

  const tbody = document.getElementById('appTable');
  if (apps.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">لا توجد بيانات</td></tr>';
  } else {
    tbody.innerHTML = apps.slice(0, 5).map(a => `
      <tr>
        <td>${a.id}</td>
        <td>${a.title}</td>
        <td>${(a.requestedAmount / 1000).toFixed(0)}K</td>
        <td><span class="status-badge status-${a.status}">${a.status === 'approved' ? 'مقبول' : 'قيد المراجعة'}</span></td>
        <td>${new Date(a.submittedAt).toLocaleDateString('ar-SA')}</td>
      </tr>
    `).join('');
  }
}

function newApplication() { alert('نموذج طلب جديد'); }
function viewApplications() { alert('جميع الطلبات'); }
function viewContracts() { alert('العقود'); }
function viewProfile() { alert('الملف الشخصي'); }

function logout(e) {
  e.preventDefault();
  localStorage.clear();
  window.location.href = 'login.html';
}

loadData();
</script>

</body>
</html>
