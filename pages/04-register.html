<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Noto Sans Arabic', sans-serif; background: #f7fafc; }
    h1, h2 { font-family: 'Cairo', sans-serif; }
    input { font-family: 'Noto Sans Arabic', sans-serif; }
  </style>
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">

<div style="background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 4px 20px -2px rgba(0, 32, 69, 0.08);">
  
  <div style="text-align: center; margin-bottom: 30px;">
    <h1 style="font-size: 28px; color: #002045; margin-bottom: 10px;">إنشاء حساب</h1>
    <p style="color: #43474e;">أنشئ حسابك لبدء تقديم طلبات المنح</p>
  </div>

  <form onsubmit="handleRegister(event)">
    <input type="text" placeholder="اسم الجمعية" required style="width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #74777f; border-radius: 8px;" />
    <input type="text" placeholder="رقم الترخيص" required style="width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #74777f; border-radius: 8px;" />
    <input type="tel" placeholder="رقم الجوال" required style="width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #74777f; border-radius: 8px;" />
    <input type="email" placeholder="البريد الإلكتروني" required style="width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #74777f; border-radius: 8px;" />
    <input type="password" placeholder="كلمة المرور" required style="width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #74777f; border-radius: 8px;" />
    <input type="password" placeholder="تأكيد كلمة المرور" required style="width: 100%; padding: 12px; margin-bottom: 24px; border: 1px solid #74777f; border-radius: 8px;" />

    <button type="submit" style="width: 100%; background: #002045; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; margin-bottom: 16px;">
      إنشاء الحساب
    </button>
  </form>

  <p style="text-align: center; color: #43474e; font-size: 14px;">
    لديك حساب؟ <a href="02-login.html" style="color: #002045; text-decoration: none; font-weight: 600;">دخول</a>
  </p>
</div>

<script>
function handleRegister(event) {
  event.preventDefault();
  alert('تم إنشاء الحساب بنجاح!');
  window.location.href = '02-login.html';
}
</script>

</body>
</html>
