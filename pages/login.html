<!-- ============ LOGIN ============ -->
<div id="page-login" class="page">
  <div class="container">
    <div class="card card-login">
      <div style="display:flex;align-items:center;justify-content:center;">
        <img src="assets/logo.svg" alt="DAMA" style="width:96px;height:96px;display:block;">
      </div>
      <div style="font-size:24px;font-weight:700;margin:24px 0 26px;text-align:center;">تسجيل الدخول</div>
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input id="login-email" class="form-input" placeholder="name@example.com" oninput="App.state.loginEmail=this.value;App.state.loginError=false;">
      </div>
      <div class="form-group" style="margin-bottom:10px;">
        <label class="form-label">كلمة المرور</label>
        <input id="login-pass" type="password" class="form-input" placeholder="••••••••" oninput="App.state.loginPass=this.value;App.state.loginError=false;">
      </div>
      <div id="login-error" class="error-text" style="display:none;">بيانات الدخول غير صحيحة.</div>
      <div style="text-align:left;font-size:13px;color:#1A81BC;margin-bottom:22px;cursor:pointer;">نسيت كلمة المرور؟</div>
      <button class="btn btn-primary" onclick="App.doLogin()">دخول</button>
      <div style="text-align:center;font-size:13px;color:#7a8190;margin-top:18px;">ليس لديك حساب؟ <span class="link" onclick="App.navigate('signup')">إنشاء حساب</span></div>
      <div class="demo-box">بيانات تجريبية · الجمعية: أي بريد · مسؤول النظام: admin@dama-business.com / adminpass · الإدارة التنفيذية: ceo@dama-business.com / execpass</div>
    </div>
  </div>
</div>
