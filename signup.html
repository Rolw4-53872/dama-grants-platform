<!-- ============ SIGNUP ============ -->
<div id="page-signup" class="page">
  <div class="container">
    <div class="card card-sm">
      <div style="display:flex;align-items:center;gap:11px;">
        <img src="assets/logo.svg" alt="DAMA" style="width:56px;height:56px;display:block;">
      </div>
      <div style="font-size:24px;font-weight:700;margin:22px 0 24px;">إنشاء حساب جمعية</div>
      <div class="form-group">
        <label class="form-label">اسم الجمعية</label>
        <input class="form-input" placeholder="جمعية ...">
      </div>
      <div class="form-group">
        <label class="form-label">رقم الترخيص</label>
        <input class="form-input" placeholder="700xxxxxx">
      </div>
      <div class="form-group">
        <label class="form-label">رقم جوال الجمعية</label>
        <input class="form-input" placeholder="05xxxxxxxx">
      </div>
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input class="form-input" placeholder="name@example.com">
      </div>
      <div class="form-group" style="margin-bottom:18px;">
        <label class="form-label">كلمة المرور</label>
        <input type="password" class="form-input" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" onclick="App.navigate('login')">إنشاء الحساب</button>
      <div style="text-align:center;font-size:13px;color:#7a8190;margin-top:16px;">لديك حساب؟ <span class="link" onclick="App.navigate('login')">تسجيل الدخول</span></div>
    </div>
  </div>
</div>
