<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة المراجع - منصة داما</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans Arabic', sans-serif; background: #f7fafc; }
    .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 20px; display: flex; justify-content: space-between; }
    .navbar h1 { color: #1e3a5f; }
    .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    .section { background: white; padding: 24px; border-radius: 12px; margin-bottom: 20px; }
    .section h3 { color: #1e3a5f; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e2e8f0; }
    th { background: #f7fafc; font-weight: 600; color: #1e3a5f; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; background: #1e3a5f; color: white; }
    .btn:hover { background: #0d1b2a; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-approved { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>

<div class="navbar">
  <h1>👨‍💼 لوحة المراجع</h1>
  <div>
    <span id="userName"></span>
    <a href="login.html" onclick="logout(event)"> | خروج</a>
  </div>
</div>

<div class="container">
  <div class="section">
    <h3>الطلبات قيد المراجعة</h3>
    <table>
      <thead>
        <tr>
          <th>الرقم</th>
          <th>الجمعية</th>
          <th>البرنامج</th>
          <th>الحالة</th>
          <th>الإجراء</th>
        </tr>
      </thead>
      <tbody id="appTable">
        <tr><td colspan="5" style="text-align: center;">جاري التحميل...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="section">
    <h3>الإحصائيات</h3>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
      <div style="background: #f7fafc; padding: 15px; border-radius: 8px;">
        <div style="font-size: 24px; font-weight: bold; color: #1e3a5f;" id="pendingReview">0</div>
        <div style="color: #666; font-size: 12px;">بانتظار المراجعة</div>
      </div>
      <div style="background: #f7fafc; padding: 15px; border-radius: 8px;">
        <div style="font-size: 24px; font-weight: bold; color: #2c694e;" id="reviewed">0</div>
        <div style="color: #666; font-size: 12px;">تمت مراجعتها</div>
      </div>
    </div>
  </div>
</div>

<script>
function loadData() {
  const user = JSON.parse(localStorage.getItem('damaCurrentUser'));
  const database = JSON.parse(localStorage.getItem('damaDatabase'));

  if (!user || user.role !== 'admin_reviewer') {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('userName').textContent = user.name;

  const apps = database.applications || [];
  const tbody = document.getElementById('appTable');

  if (apps.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">لا توجد طلبات</td></tr>';
  } else {
    tbody.innerHTML = apps.map(a => `
      <tr>
        <td>${a.id}</td>
        <td>${a.societyId}</td>
        <td>${a.title}</td>
        <td><span class="status-badge status-${a.status}">${a.status}</span></td>
        <td><button class="btn" onclick="review('${a.id}')">مراجعة</button></td>
      </tr>
    `).join('');
  }

  document.getElementById('pendingReview').textContent = apps.filter(a => a.status === 'pending_review').length;
  document.getElementById('reviewed').textContent = apps.filter(a => a.status !== 'pending_review').length;
}

function review(appId) {
  alert('فتح صفحة مراجعة الطلب: ' + appId);
}

function logout(e) {
  e.preventDefault();
  localStorage.clear();
  window.location.href = 'login.html';
}

loadData();
</script>

</body>
</html>
