<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة - منصة داما</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans Arabic', sans-serif; background: #f7fafc; }
    .navbar { background: linear-gradient(90deg, #1e3a5f, #2c694e); color: white; padding: 20px; }
    .navbar h1 { font-size: 24px; }
    .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: white; padding: 20px; border-radius: 12px; border-left: 4px solid #1e3a5f; }
    .card .value { font-size: 28px; font-weight: bold; color: #1e3a5f; margin-bottom: 8px; }
    .card .label { color: #666; }
    .section { background: white; padding: 24px; border-radius: 12px; margin-bottom: 20px; }
    .section h3 { color: #1e3a5f; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e2e8f0; }
    th { background: #f7fafc; font-weight: 600; }
    .sidebar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .menu-btn { padding: 12px; background: #1e3a5f; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .menu-btn:hover { background: #0d1b2a; }
  </style>
</head>
<body>

<div class="navbar">
  <h1>⚙️ لوحة الإدارة</h1>
  <div style="color: white; margin-top: 10px;">
    <span id="userName"></span>
    <a href="login.html" onclick="logout(event)" style="color: white; text-decoration: none;"> | خروج</a>
  </div>
</div>

<div class="container">
  <div class="grid">
    <div class="card">
      <div class="value" id="userCount">0</div>
      <div class="label">المستخدمين</div>
    </div>
    <div class="card">
      <div class="value" id="societyCount">0</div>
      <div class="label">الجمعيات</div>
    </div>
    <div class="card">
      <div class="value" id="appCount">0</div>
      <div class="label">الطلبات</div>
    </div>
    <div class="card">
      <div class="value" id="auditCount">0</div>
      <div class="label">سجل التدقيق</div>
    </div>
  </div>

  <div class="section">
    <h3>الإدارة</h3>
    <div class="sidebar">
      <button class="menu-btn" onclick="manage('users')">👥 المستخدمين</button>
      <button class="menu-btn" onclick="manage('societies')">🏢 الجمعيات</button>
      <button class="menu-btn" onclick="manage('roles')">🔐 الأدوار</button>
      <button class="menu-btn" onclick="manage('audit')">📋 التدقيق</button>
      <button class="menu-btn" onclick="manage('settings')">⚙️ الإعدادات</button>
      <button class="menu-btn" onclick="manage('backup')">💾 النسخ الاحتياطي</button>
    </div>
  </div>

  <div class="section">
    <h3>آخر العمليات</h3>
    <table>
      <thead>
        <tr>
          <th>المستخدم</th>
          <th>الإجراء</th>
          <th>الوصف</th>
          <th>التاريخ</th>
        </tr>
      </thead>
      <tbody id="auditTable">
        <tr><td colspan="4" style="text-align: center;">جاري التحميل...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="section">
    <h3>إحصائيات النظام</h3>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
      <div style="background: #f7fafc; padding: 15px; border-radius: 8px;">
        <div style="font-size: 18px; font-weight: bold; color: #1e3a5f;" id="activeUsers">0</div>
        <div style="color: #666; font-size: 12px;">المستخدمين النشطين</div>
      </div>
      <div style="background: #f7fafc; padding: 15px; border-radius: 8px;">
        <div style="font-size: 18px; font-weight: bold; color: #2c694e;" id="totalGrants">0</div>
        <div style="color: #666; font-size: 12px;">إجمالي المنح</div>
      </div>
      <div style="background: #f7fafc; padding: 15px; border-radius: 8px;">
        <div style="font-size: 18px; font-weight: bold; color: #1e3a5f;" id="systemStatus">✓ جيد</div>
        <div style="color: #666; font-size: 12px;">حالة النظام</div>
      </div>
    </div>
  </div>
</div>

<script>
function loadData() {
  const user = JSON.parse(localStorage.getItem('damaCurrentUser'));
  const database = JSON.parse(localStorage.getItem('damaDatabase'));

  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('userName').textContent = user.name;

  const users = database.users || [];
  const societies = database.societies || [];
  const apps = database.applications || [];
  const audit = database.auditLog || [];

  document.getElementById('userCount').textContent = users.length;
  document.getElementById('societyCount').textContent = societies.length;
  document.getElementById('appCount').textContent = apps.length;
  document.getElementById('auditCount').textContent = audit.length;
  document.getElementById('activeUsers').textContent = users.filter(u => u.status === 'active').length;
  document.getElementById('totalGrants').textContent = (apps.filter(a => a.decision === 'approved').reduce((s, a) => s + a.requestedAmount, 0) / 1000000).toFixed(1) + 'M';

  const auditTable = document.getElementById('auditTable');
  if (audit.length === 0) {
    auditTable.innerHTML = '<tr><td colspan="4" style="text-align: center;">لا توجد عمليات</td></tr>';
  } else {
    auditTable.innerHTML = audit.slice(0, 10).map(log => `
      <tr>
        <td>${log.userName || 'نظام'}</td>
        <td>${log.action}</td>
        <td>${log.details}</td>
        <td>${new Date(log.timestamp).toLocaleDateString('ar-SA')}</td>
      </tr>
    `).join('');
  }
}

function manage(section) {
  alert('فتح قسم: ' + section);
}

function logout(e) {
  e.preventDefault();
  localStorage.clear();
  window.location.href = 'login.html';
}

loadData();
</script>

</body>
</html>
