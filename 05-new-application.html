<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>طلب منحة جديد</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Noto Sans Arabic', sans-serif; background: #f7fafc; }
    h1, h2 { font-family: 'Cairo', sans-serif; }
  </style>
</head>
<body>

<nav style="background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 20px;">
  <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between;">
    <h1 style="font-size: 24px; color: #002045;">DAMA</h1>
    <a href="06-dashboard.html" style="color: #002045; text-decoration: none;">العودة</a>
  </div>
</nav>

<main style="max-width: 900px; margin: 0 auto; padding: 40px 20px;">
  <h2 style="font-size: 32px; color: #002045; margin-bottom: 10px;">طلب منحة جديد</h2>
  <p style="color: #43474e; margin-bottom: 30px;">اتبع الخطوات التالية لتقديم طلب منحة جديد</p>

  <!-- Stepper -->
  <div style="display: flex; justify-content: space-between; margin-bottom: 40px;">
    <div style="display: flex; flex-direction: column; align-items: center; flex: 1;">
      <div style="width: 40px; height: 40px; background: #002045; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-bottom: 10px;">1</div>
      <p style="font-size: 12px; color: #43474e;">بيانات الجمعية</p>
    </div>
    <div style="flex: 1; background: #e2e8f0; height: 2px; margin-top: 20px; margin-x: 16px;"></div>
    <div style="display: flex; flex-direction: column; align-items: center; flex: 1;">
      <div style="width: 40px; height: 40px; background: #c0c7d4; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-bottom: 10px;">2</div>
      <p style="font-size: 12px; color: #43474e;">المشروع</p>
    </div>
    <div style="flex: 1; background: #e2e8f0; height: 2px; margin-top: 20px;"></div>
    <div style="display: flex; flex-direction: column; align-items: center; flex: 1;">
      <div style="width: 40px; height: 40px; background: #c0c7d4; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-bottom: 10px;">3</div>
      <p style="font-size: 12px; color: #43474e;">الملفات</p>
    </div>
  </div>

  <!-- Form -->
  <div style="background: white; padding: 30px; border-radius: 12px;">
    <h3 style="font-size: 20px; color: #002045; margin-bottom: 20px;">الخطوة 1: بيانات الجمعية</h3>
    
    <form onsubmit="handleSubmit(event)">
      <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: 600; margin-bottom: 8px;">اسم الجمعية</label>
        <input type="text" value="جمعية البر بجدة" readonly style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f7fafc;" />
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: 600; margin-bottom: 8px;">رقم الترخيص</label>
        <input type="text" value="700123456" readonly style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f7fafc;" />
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: 600; margin-bottom: 8px;">اسم المشروع</label>
        <input type="text" placeholder="أدخل اسم المشروع" required style="width: 100%; padding: 12px; border: 1px solid #74777f; border-radius: 8px; font-family: 'Noto Sans Arabic', sans-serif;" />
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: 600; margin-bottom: 8px;">وصف المشروع</label>
        <textarea placeholder="اكتب وصفاً مختصراً للمشروع" rows="4" style="width: 100%; padding: 12px; border: 1px solid #74777f; border-radius: 8px; font-family: 'Noto Sans Arabic', sans-serif; resize: vertical;"></textarea>
      </div>

      <div style="display: flex; gap: 16px; margin-top: 30px;">
        <button type="submit" style="background: #002045; color: white; padding: 12px 32px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600;">التالي</button>
        <button type="button" onclick="window.location.href='06-dashboard.html'" style="background: transparent; color: #002045; padding: 12px 32px; border: 2px solid #74777f; border-radius: 8px; cursor: pointer; font-weight: 600;">إلغاء</button>
      </div>
    </form>
  </div>
</main>

<script>
function handleSubmit(event) {
  event.preventDefault();
  alert('تم حفظ البيانات! انتقل إلى الخطوة التالية');
}
</script>

</body>
</html>
