<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة المدير التنفيذي - منصة داما</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans Arabic', sans-serif; background: #f7fafc; }
    .navbar { background: linear-gradient(90deg, #1e3a5f, #2c694e); color: white; padding: 20px; display: flex; justify-content: space-between; }
    .navbar h1 { font-size: 24px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 24px; border-radius: 12px; border-left: 4px solid #2c694e; }
    .stat-card .number { font-size: 32px; font-weight: bold; color: #1e3a5f; }
    .stat-card .label { color: #666; margin-top: 8px; }
    .section { background: white; padding: 24px; border-radius: 12px; margin-bottom: 20px; }
    .section h3 { color: #1e3a5f; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e2e8f0; }
    th { background: #f7fafc; font-weight: 600; }
    .status-approved { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
    .status-rejected { background: #fdf3f2; color: #b23b34; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
    .btn { padding: 8px 16px; background: #1e3a5f; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .btn:hover { background: #0d1b2a; }
  </style>
</head>
<body>

<div class="navbar">
  <h1>👔 لوحة المدير التنفيذي</h1>
  <div style="color: white;">
    <span id="userName"></span>
    <a href="login.html" onclick="logout(event)" style="color: white; text-decoration: none;"> | خروج</a>
  </div>
</div>

<div class="container">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="number" id="totalApps">0</div>
      <div class="label">إجمالي الطلبات</div>
    </div>
    <div class="stat-card">
      <div class="number" id="approved">0</div>
      <div class="label">الموافقة</div>
    </div>
    <div class="stat-card">
      <div class="number" id="rejected">0</div>
      <div class="label">المرفوضة</div>
    </div>
    <div class="stat-card">
      <div class="number" id="totalBudget">0</div>
      <div class="label">إجمالي الموافقات</div>
    </div>
  </div>

  <div class="section">
    <h3>الطلبات المعلقة (بانتظار الموافقة)</h3>
    <table>
      <thead>
        <tr>
          <th>الرقم</th>
          <th>الجمعية</th>
          <th>المبلغ</th>
          <th>الدرجة</th>
          <th>الإجراء</th>
        </tr>
      </thead>
      <tbody id="pendingTable">
        <tr><td colspan="5" style="text-align: center;">لا توجد طلبات معلقة</td></tr>
      </tbody>
    </table>
  </div>

  <div class="section">
    <h3>آخر القرارات</h3>
    <table>
      <thead>
        <tr>
          <th>الرقم</th>
          <th>الجمعية</th>
          <th>الحالة</th>
          <th>التاريخ</th>
        </tr>
      </thead>
      <tbody id="decisionsTable">
        <tr><td colspan="4" style="text-align: center;">لا توجد قرارات</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function loadData() {
  const user = JSON.parse(localStorage.getItem('damaCurrentUser'));
  const database = JSON.parse(localStorage.getItem('damaDatabase'));

  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('userName').textContent = user.name;

  const apps = database.applications || [];
  const approved = apps.filter(a => a.decision === 'approved');
  const rejected = apps.filter(a => a.decision === 'rejected');
  const pending = apps.filter(a => !a.decision);
  const totalBudget = approved.reduce((sum, a) => sum + a.requestedAmount, 0);

  document.getElementById('totalApps').textContent = apps.length;
  document.getElementById('approved').textContent = approved.length;
  document.getElementById('rejected').textContent = rejected.length;
  document.getElementById('totalBudget').textContent = (totalBudget / 1000000).toFixed(1) + 'M';

  // عرض الطلبات المعلقة
  const pendingBody = document.getElementById('pendingTable');
  if (pending.length === 0) {
    pendingBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">لا توجد طلبات معلقة</td></tr>';
  } else {
    pendingBody.innerHTML = pending.map(a => `
      <tr>
        <td>${a.id}</td>
        <td>${a.societyId}</td>
        <td>${(a.requestedAmount / 1000).toFixed(0)}K</td>
        <td>${a.score || '-'}</td>
        <td>
          <button class="btn" onclick="approve('${a.id}')">موافقة</button>
        </td>
      </tr>
    `).join('');
  }

  // عرض القرارات
  const decisionsBody = document.getElementById('decisionsTable');
  if (approved.length === 0 && rejected.length === 0) {
    decisionsBody.innerHTML = '<tr><td colspan="4" style="text-align: center;">لا توجد قرارات</td></tr>';
  } else {
    const allDecisions = [...approved, ...rejected].slice(0, 10);
    decisionsBody.innerHTML = allDecisions.map(a => `
      <tr>
        <td>${a.id}</td>
        <td>${a.societyId}</td>
        <td><span class="status-${a.decision}">${a.decision === 'approved' ? '✓ موافق' : '✗ مرفوض'}</span></td>
        <td>${new Date(a.approvedAt || a.submittedAt).toLocaleDateString('ar-SA')}</td>
      </tr>
    `).join('');
  }
}

function approve(appId) {
  alert('الموافقة على الطلب: ' + appId);
}

function logout(e) {
  e.preventDefault();
  localStorage.clear();
  window.location.href = 'login.html';
}

loadData();
</script>

</body>
</html>
