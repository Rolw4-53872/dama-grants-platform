<!DOCTYPE html>
<html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>طلب تعديل</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet"/></head><body style="font-family:'Noto Sans Arabic',sans-serif;background:#f7fafc"><nav style="background:white;border-bottom:1px solid #e2e8f0;padding:16px 20px"><div style="max-width:1400px;margin:0 auto;display:flex;justify-content:space-between"><h1 style="font-size:24px;color:#002045;font-family:'Cairo'">DAMA</h1><a href="06-dashboard.html" style="color:#002045;text-decoration:none">العودة</a></div></nav><main style="max-width:800px;margin:0 auto;padding:40px 20px"><h2 style="font-size:32px;color:#002045;margin-bottom:10px;font-family:'Cairo'">طلب تعديل</h2><p style="color:#43474e;margin-bottom:30px">الطلب رقم #REQ-001 يحتاج إلى تعديلات</p><div style="background:#f7eed9;padding:20px;border-radius:8px;border-left:4px solid #b8842a;margin-bottom:30px"><h3 style="font-weight:600;color:#b8842a;margin-bottom:8px">التعديلات المطلوبة:</h3><ul style="list-style:none;padding:0;color:#b8842a;font-size:14px"><li>- إعادة صياغة أهداف المشروع</li><li>- توضيح المخرجات المتوقعة</li><li>- تحديث الموازنة المالية</li></ul></div><div style="background:white;padding:30px;border-radius:12px"><form onsubmit="handleModification(event)"><h3 style="font-size:18px;color:#002045;margin-bottom:16px;font-family:'Cairo'">ملفاتك المعدلة</h3><div style="margin-bottom:20px"><label style="display:block;font-weight:600;margin-bottom:8px">اختر الملفات المعدلة</label><input type="file" multiple style="width:100%;padding:12px;border:2px dashed #74777f;border-radius:8px;cursor:pointer"/></div><textarea placeholder="أضف ملاحظاتك عن التعديلات..." style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-family:'Noto Sans Arabic';resize:vertical;height:80px;margin-bottom:20px"></textarea><div style="display:flex;gap:12px"><button type="submit" style="background:#002045;color:white;padding:12px 24px;border-radius:8px;border:none;cursor:pointer;font-weight:600">إرسال التعديلات</button><button type="button" onclick="window.location.href='09-application-details.html'" style="background:transparent;color:#002045;padding:12px 24px;border:2px solid #74777f;border-radius:8px;cursor:pointer;font-weight:600">إلغاء</button></div></form></div></main><script>function handleModification(e){e.preventDefault();alert('تم إرسال التعديلات بنجاح!');window.location.href='09-application-details.html'}</script></body></html>
